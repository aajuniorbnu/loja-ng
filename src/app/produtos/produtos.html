<div class="max-w-3xl mx-auto mt-8 p-6 bg-white rounded-xl shadow-md">

  <h1 class="text-2xl font-bold text-gray-800 mb-6">
    Cadastro de Produtos
  </h1>

  <ul class="mb-6 space-y-3">
    @if(produtos.length === 0){
      <li class="text-gray-500 bg-gray-100 p-4 rounded-lg text-center">
        Nenhum produto cadastrado
      </li>
    } @else {

      @for(produto of produtos; let i = $index; track produto){
        <li class="flex items-center justify-between bg-gray-50 border border-gray-200 p-4">

          <span class="text-gray-800 font-medium">
            {{ produto }} -
            Qtd: {{ quantidades[i] }} -
            Valor: R$ {{ valores[i] }}
          </span>

          <div class="flex gap-2">
            <button
              class="bg-yellow-100 text-yellow-600 hover:bg-yellow-200 px-3 py-2"
              (click)="preencherCamposParaEditar(produto, quantidades[i], valores[i])">
              <i class="fa-solid fa-pencil"></i>
            </button>

            <button
              class="bg-red-100 text-red-700 hover:bg-red-200 px-3 py-2"
              (click)="apagar(produto)">
              <i class="fa-solid fa-trash"></i>
            </button>
          </div>

        </li>
      }
    }
  </ul>

  <div class="bg-gray-50 border border-gray-200 rounded-xl p-5">
    <h2 class="text-xl font-semibold text-gray-700 mb-4">
      Novo Produto
    </h2>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

      <div>
        <label for="campo-nome" class="block text-sm font-medium text-gray-700 mb-1">
          Nome
        </label>
        <input
          id="campo-nome"
          type="text"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-400"
          [(ngModel)]="nome"
          placeholder="Nome do produto">
      </div>

      <div>
        <label for="campo-quantidade" class="block text-sm font-medium text-gray-700 mb-1">
          Quantidade
        </label>
        <input
          id="campo-quantidade"
          type="number"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-400"
          [(ngModel)]="quantidade"
          placeholder="Qtd">
      </div>

      <div>
        <label for="campo-valor" class="block text-sm font-medium text-gray-700 mb-1">
          Valor
        </label>
        <input
          id="campo-valor"
          type="number"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-400"
          [(ngModel)]="valor"
          placeholder="Valor">
      </div>

    </div>

    <button
      class="mt-5 bg-teal-500 hover:bg-teal-600 text-white font-semibold px-6 py-2 rounded-lg shadow transition"
      (click)="salvar()">
      Salvar
    </button>
  </div>

</div>
